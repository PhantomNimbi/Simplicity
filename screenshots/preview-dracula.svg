<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .mono { font-family: 'DejaVu Sans Mono', 'Courier New', monospace; }
      .sans { font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <!-- Window drop shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Desktop background -->
  <defs>
    <linearGradient id="desktopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0e17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#191a21;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#desktopGrad)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FILE MANAGER WINDOW — Dracula                   -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body (Dracula bg) -->
    <rect x="30" y="40" width="530" height="390" rx="6" ry="6" fill="#282a36" stroke="#44475a" stroke-width="1"/>

    <!-- Title bar (Dracula dark) -->
    <rect x="30" y="40" width="530" height="34" rx="6" ry="6" fill="#21222c" stroke="#44475a" stroke-width="1"/>
    <rect x="30" y="60" width="530" height="14" fill="#21222c"/>

    <!-- Title bar buttons -->
    <circle cx="52" cy="57" r="7" fill="#ff5555"/>
    <circle cx="73" cy="57" r="7" fill="#ffb86c"/>
    <circle cx="94" cy="57" r="7" fill="#50fa7b"/>

    <!-- Window title -->
    <text x="290" y="62" text-anchor="middle" class="sans" font-size="13" fill="#f8f8f2">Files — Home</text>

    <!-- Toolbar (Dracula) -->
    <rect x="30" y="74" width="530" height="36" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <rect x="40" y="82" width="26" height="20" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="53" y="96" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">‹</text>
    <rect x="70" y="82" width="26" height="20" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="83" y="96" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">›</text>
    <rect x="100" y="82" width="26" height="20" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="113" y="96" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">↑</text>

    <!-- Location bar -->
    <rect x="136" y="82" width="280" height="20" rx="4" fill="#1e1f29" stroke="#bd93f9" stroke-width="1"/>
    <text x="148" y="96" class="sans" font-size="11" fill="#f8f8f2">/home/user/Documents</text>

    <!-- Search button -->
    <rect x="424" y="82" width="62" height="20" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="455" y="96" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">⌕ Search</text>

    <!-- Sidebar (Dracula dark panel) -->
    <rect x="30" y="110" width="140" height="320" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>

    <rect x="30" y="148" width="140" height="24" fill="#bd93f9" fill-opacity="0.2"/>
    <rect x="30" y="148" width="3" height="24" fill="#bd93f9"/>

    <text x="50" y="128" class="sans" font-size="10" fill="#6272a4" letter-spacing="1">PLACES</text>
    <text x="50" y="165" class="sans" font-size="12" fill="#f8f8f2">🏠 Home</text>
    <text x="50" y="191" class="sans" font-size="12" fill="#6272a4">🖥 Desktop</text>
    <text x="50" y="216" class="sans" font-size="12" fill="#6272a4">📄 Documents</text>
    <text x="50" y="241" class="sans" font-size="12" fill="#6272a4">⬇ Downloads</text>
    <text x="50" y="266" class="sans" font-size="12" fill="#6272a4">🎵 Music</text>
    <text x="50" y="291" class="sans" font-size="12" fill="#6272a4">🖼 Pictures</text>
    <text x="50" y="316" class="sans" font-size="12" fill="#6272a4">🎬 Videos</text>
    <text x="50" y="345" class="sans" font-size="10" fill="#6272a4" letter-spacing="1">DEVICES</text>
    <text x="50" y="365" class="sans" font-size="12" fill="#6272a4">💾 128 GB Drive</text>
    <text x="50" y="390" class="sans" font-size="12" fill="#6272a4">📀 USB Drive</text>

    <!-- Main file area (Dracula bg) -->
    <rect x="170" y="110" width="390" height="320" fill="#282a36"/>

    <!-- File grid header -->
    <rect x="170" y="110" width="390" height="24" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <text x="182" y="126" class="sans" font-size="11" fill="#6272a4">Name</text>
    <text x="380" y="126" class="sans" font-size="11" fill="#6272a4">Size</text>
    <text x="460" y="126" class="sans" font-size="11" fill="#6272a4">Modified</text>

    <!-- File rows -->
    <rect x="170" y="134" width="390" height="24" fill="#bd93f9" fill-opacity="0.15"/>
    <rect x="170" y="134" width="390" height="24" stroke="#bd93f9" stroke-width="0.5" fill="none"/>
    <text x="200" y="150" class="sans" font-size="12" fill="#f8f8f2">📁 Projects</text>
    <text x="375" y="150" text-anchor="end" class="sans" font-size="11" fill="#cdd6f4">—</text>
    <text x="455" y="150" class="sans" font-size="11" fill="#cdd6f4">Apr 20 09:15</text>

    <rect x="170" y="158" width="390" height="24" fill="transparent"/>
    <text x="200" y="174" class="sans" font-size="12" fill="#6272a4">📁 Archive</text>
    <text x="375" y="174" text-anchor="end" class="sans" font-size="11" fill="#6272a4">—</text>
    <text x="455" y="174" class="sans" font-size="11" fill="#6272a4">Mar 14 17:30</text>

    <rect x="170" y="182" width="390" height="24" fill="#383a4b"/>
    <text x="200" y="198" class="sans" font-size="12" fill="#f8f8f2">📄 notes.txt</text>
    <text x="375" y="198" text-anchor="end" class="sans" font-size="11" fill="#cdd6f4">4.2 KB</text>
    <text x="455" y="198" class="sans" font-size="11" fill="#cdd6f4">Apr 22 11:00</text>

    <rect x="170" y="206" width="390" height="24" fill="transparent"/>
    <text x="200" y="222" class="sans" font-size="12" fill="#6272a4">📄 resume.pdf</text>
    <text x="375" y="222" text-anchor="end" class="sans" font-size="11" fill="#6272a4">218 KB</text>
    <text x="455" y="222" class="sans" font-size="11" fill="#6272a4">Jan 05 14:22</text>

    <rect x="170" y="230" width="390" height="24" fill="transparent"/>
    <text x="200" y="246" class="sans" font-size="12" fill="#6272a4">🎵 playlist.m3u</text>
    <text x="375" y="246" text-anchor="end" class="sans" font-size="11" fill="#6272a4">1.1 KB</text>
    <text x="455" y="246" class="sans" font-size="11" fill="#6272a4">Feb 18 20:10</text>

    <rect x="170" y="254" width="390" height="24" fill="transparent"/>
    <text x="200" y="270" class="sans" font-size="12" fill="#6272a4">🖼 wallpaper.png</text>
    <text x="375" y="270" text-anchor="end" class="sans" font-size="11" fill="#6272a4">3.4 MB</text>
    <text x="455" y="270" class="sans" font-size="11" fill="#6272a4">Mar 31 08:44</text>

    <rect x="170" y="278" width="390" height="24" fill="transparent"/>
    <text x="200" y="294" class="sans" font-size="12" fill="#6272a4">📦 backup.tar.gz</text>
    <text x="375" y="294" text-anchor="end" class="sans" font-size="11" fill="#6272a4">142 MB</text>
    <text x="455" y="294" class="sans" font-size="11" fill="#6272a4">Apr 01 23:55</text>

    <rect x="170" y="302" width="390" height="24" fill="transparent"/>
    <text x="200" y="318" class="sans" font-size="12" fill="#6272a4">📄 config.yaml</text>
    <text x="375" y="318" text-anchor="end" class="sans" font-size="11" fill="#6272a4">872 B</text>
    <text x="455" y="318" class="sans" font-size="11" fill="#6272a4">Apr 10 16:20</text>

    <!-- Status bar (Dracula dark) -->
    <rect x="170" y="402" width="390" height="28" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <text x="182" y="420" class="sans" font-size="11" fill="#6272a4">8 items — 1 selected (Projects, folder)</text>

    <!-- Scrollbar -->
    <rect x="551" y="134" width="9" height="296" rx="4" fill="#1e1f29"/>
    <rect x="551" y="134" width="9" height="80" rx="4" fill="#44475a"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SETTINGS / DIALOG WINDOW — Dracula              -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body (Dracula) -->
    <rect x="590" y="60" width="278" height="340" rx="6" ry="6" fill="#282a36" stroke="#44475a" stroke-width="1"/>

    <!-- Title bar (Dracula dark) -->
    <rect x="590" y="60" width="278" height="34" rx="6" ry="6" fill="#21222c" stroke="#44475a" stroke-width="1"/>
    <rect x="590" y="80" width="278" height="14" fill="#21222c"/>

    <circle cx="611" cy="77" r="7" fill="#ff5555"/>
    <circle cx="631" cy="77" r="7" fill="#ffb86c"/>
    <circle cx="651" cy="77" r="7" fill="#50fa7b"/>

    <text x="729" y="82" text-anchor="middle" class="sans" font-size="13" fill="#f8f8f2">Appearance</text>

    <!-- Content area (Dracula) -->
    <rect x="590" y="94" width="278" height="306" fill="#282a36"/>

    <text x="608" y="116" class="sans" font-size="11" fill="#6272a4" letter-spacing="1">THEME</text>
    <rect x="608" y="122" width="242" height="36" rx="4" fill="#1e1f29" stroke="#bd93f9" stroke-width="1"/>
    <text x="622" y="145" class="sans" font-size="13" fill="#f8f8f2">Simplicity-Dracula</text>
    <text x="838" y="145" text-anchor="end" class="sans" font-size="11" fill="#6272a4">▾</text>

    <text x="608" y="178" class="sans" font-size="11" fill="#6272a4" letter-spacing="1">ACCENT COLOUR</text>
    <circle cx="622" cy="198" r="10" fill="#bd93f9" stroke="#f8f8f2" stroke-width="2"/>
    <circle cx="648" cy="198" r="10" fill="#ff5555"/>
    <circle cx="674" cy="198" r="10" fill="#50fa7b"/>
    <circle cx="700" cy="198" r="10" fill="#ffb86c"/>
    <circle cx="726" cy="198" r="10" fill="#8be9fd"/>

    <text x="608" y="228" class="sans" font-size="11" fill="#6272a4" letter-spacing="1">FONT</text>
    <rect x="608" y="234" width="242" height="36" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="1"/>
    <text x="622" y="257" class="sans" font-size="13" fill="#f8f8f2">DejaVu Sans  11</text>
    <text x="838" y="257" text-anchor="end" class="sans" font-size="11" fill="#6272a4">▾</text>

    <text x="608" y="292" class="sans" font-size="11" fill="#6272a4" letter-spacing="1">OPTIONS</text>
    <text x="622" y="316" class="sans" font-size="12" fill="#f8f8f2">Dark mode</text>
    <rect x="795" y="306" width="36" height="18" rx="9" fill="#bd93f9"/>
    <circle cx="822" cy="315" r="7" fill="#ffffff"/>
    <text x="622" y="342" class="sans" font-size="12" fill="#f8f8f2">Window animations</text>
    <rect x="795" y="332" width="36" height="18" rx="9" fill="#44475a"/>
    <circle cx="804" cy="341" r="7" fill="#6272a4"/>

    <!-- Dialog buttons (Dracula) -->
    <rect x="590" y="370" width="278" height="30" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <rect x="690" y="377" width="70" height="17" rx="4" fill="#bd93f9"/>
    <text x="725" y="389" text-anchor="middle" class="sans" font-size="11" fill="#282a36">Apply</text>
    <rect x="768" y="377" width="70" height="17" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="803" y="389" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">Cancel</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TERMINAL WINDOW (bottom)                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="460" width="840" height="84" rx="6" ry="6" fill="#1e1f29" stroke="#44475a" stroke-width="1"/>
    <rect x="30" y="460" width="840" height="28" rx="6" ry="6" fill="#21222c" stroke="#44475a" stroke-width="1"/>
    <rect x="30" y="476" width="840" height="12" fill="#21222c"/>

    <circle cx="51" cy="474" r="6" fill="#ff5555"/>
    <circle cx="70" cy="474" r="6" fill="#ffb86c"/>
    <circle cx="89" cy="474" r="6" fill="#50fa7b"/>

    <rect x="108" y="462" width="110" height="26" rx="4" fill="#1e1f29" stroke="#bd93f9" stroke-width="1"/>
    <text x="163" y="478" text-anchor="middle" class="sans" font-size="11" fill="#f8f8f2">bash — user@host</text>
    <rect x="222" y="462" width="100" height="26" rx="4" fill="transparent"/>
    <text x="272" y="478" text-anchor="middle" class="sans" font-size="11" fill="#6272a4">vim config.yaml</text>

    <rect x="30" y="488" width="840" height="56" fill="#1e1f29"/>
    <text x="46" y="507" class="mono" font-size="12" fill="#50fa7b">user@host</text>
    <text x="121" y="507" class="mono" font-size="12" fill="#f8f8f2">:</text>
    <text x="130" y="507" class="mono" font-size="12" fill="#bd93f9">~</text>
    <text x="145" y="507" class="mono" font-size="12" fill="#f8f8f2">$</text>
    <text x="158" y="507" class="mono" font-size="12" fill="#f8f8f2">./install.sh --dracula</text>
    <text x="46" y="527" class="mono" font-size="12" fill="#6272a4">✓ Detected: Ubuntu — GNOME</text>
    <text x="46" y="543" class="mono" font-size="12" fill="#bd93f9">→</text>
    <text x="58" y="543" class="mono" font-size="12" fill="#f8f8f2">Applying Simplicity-Dracula...</text>
    <rect x="284" y="530" width="8" height="14" fill="#f8f8f2" opacity="0.8"/>
  </g>

  <!-- Label -->
  <text x="450" y="555" text-anchor="middle" class="sans" font-size="11" fill="#44475a">Simplicity-Dracula — Dracula colour palette</text>
</svg>
