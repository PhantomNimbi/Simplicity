<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .mono { font-family: 'DejaVu Sans Mono', 'Courier New', monospace; }
      .sans { font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <!-- Window drop shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Desktop background -->
  <rect width="900" height="560" fill="#1a1a2e"/>
  <!-- Subtle desktop gradient -->
  <rect width="900" height="560" fill="url(#desktopGrad)"/>
  <defs>
    <linearGradient id="desktopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FILE MANAGER WINDOW                             -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body -->
    <rect x="30" y="40" width="530" height="390" rx="6" ry="6" fill="#2d2d2d" stroke="#404040" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="30" y="40" width="530" height="34" rx="6" ry="6" fill="#252525" stroke="#404040" stroke-width="1"/>
    <rect x="30" y="60" width="530" height="14" fill="#252525"/>

    <!-- Title bar buttons -->
    <circle cx="52" cy="57" r="7" fill="#cf6679"/>
    <circle cx="73" cy="57" r="7" fill="#e5a050"/>
    <circle cx="94" cy="57" r="7" fill="#4caf50"/>

    <!-- Window title -->
    <text x="290" y="62" text-anchor="middle" class="sans" font-size="13" fill="#e0e0e0">Files — Home</text>

    <!-- Toolbar -->
    <rect x="30" y="74" width="530" height="36" fill="#2a2a2a" stroke="#404040" stroke-width="0.5"/>
    <!-- Back / Forward / Up buttons -->
    <rect x="40" y="82" width="26" height="20" rx="4" fill="#383838" stroke="#404040" stroke-width="0.5"/>
    <text x="53" y="96" text-anchor="middle" class="sans" font-size="11" fill="#8a8a8a">‹</text>
    <rect x="70" y="82" width="26" height="20" rx="4" fill="#383838" stroke="#404040" stroke-width="0.5"/>
    <text x="83" y="96" text-anchor="middle" class="sans" font-size="11" fill="#8a8a8a">›</text>
    <rect x="100" y="82" width="26" height="20" rx="4" fill="#383838" stroke="#404040" stroke-width="0.5"/>
    <text x="113" y="96" text-anchor="middle" class="sans" font-size="11" fill="#8a8a8a">↑</text>

    <!-- Location bar -->
    <rect x="136" y="82" width="280" height="20" rx="4" fill="#1e1e1e" stroke="#5294e2" stroke-width="1"/>
    <text x="148" y="96" class="sans" font-size="11" fill="#e0e0e0">/home/user/Documents</text>

    <!-- Search button -->
    <rect x="424" y="82" width="62" height="20" rx="4" fill="#383838" stroke="#404040" stroke-width="0.5"/>
    <text x="455" y="96" text-anchor="middle" class="sans" font-size="11" fill="#a0a0a0">⌕ Search</text>

    <!-- Sidebar -->
    <rect x="30" y="110" width="140" height="320" fill="#252525" stroke="#404040" stroke-width="0.5"/>

    <!-- Sidebar items -->
    <!-- Selected item highlight -->
    <rect x="30" y="148" width="140" height="24" fill="#5294e2" fill-opacity="0.25"/>
    <rect x="30" y="148" width="3" height="24" fill="#5294e2"/>

    <text x="50" y="128" class="sans" font-size="10" fill="#888888" letter-spacing="1">PLACES</text>
    <text x="50" y="165" class="sans" font-size="12" fill="#e0e0e0">🏠 Home</text>
    <text x="50" y="191" class="sans" font-size="12" fill="#a0a0a0">🖥 Desktop</text>
    <text x="50" y="216" class="sans" font-size="12" fill="#a0a0a0">📄 Documents</text>
    <text x="50" y="241" class="sans" font-size="12" fill="#a0a0a0">⬇ Downloads</text>
    <text x="50" y="266" class="sans" font-size="12" fill="#a0a0a0">🎵 Music</text>
    <text x="50" y="291" class="sans" font-size="12" fill="#a0a0a0">🖼 Pictures</text>
    <text x="50" y="316" class="sans" font-size="12" fill="#a0a0a0">🎬 Videos</text>

    <text x="50" y="345" class="sans" font-size="10" fill="#888888" letter-spacing="1">DEVICES</text>
    <text x="50" y="365" class="sans" font-size="12" fill="#a0a0a0">💾 128 GB Drive</text>
    <text x="50" y="390" class="sans" font-size="12" fill="#a0a0a0">📀 USB Drive</text>

    <!-- Main file area -->
    <rect x="170" y="110" width="390" height="320" fill="#2d2d2d"/>

    <!-- File grid header -->
    <rect x="170" y="110" width="390" height="24" fill="#272727" stroke="#404040" stroke-width="0.5"/>
    <text x="182" y="126" class="sans" font-size="11" fill="#888888">Name</text>
    <text x="380" y="126" class="sans" font-size="11" fill="#888888">Size</text>
    <text x="460" y="126" class="sans" font-size="11" fill="#888888">Modified</text>

    <!-- File rows -->
    <!-- Row 1 - selected -->
    <rect x="170" y="134" width="390" height="24" fill="#5294e2" fill-opacity="0.2"/>
    <rect x="170" y="134" width="390" height="24" stroke="#5294e2" stroke-width="0.5" fill="none"/>
    <text x="200" y="150" class="sans" font-size="12" fill="#e0e0e0">📁 Projects</text>
    <text x="375" y="150" text-anchor="end" class="sans" font-size="11" fill="#c0c0c0">—</text>
    <text x="455" y="150" class="sans" font-size="11" fill="#c0c0c0">Apr 20 09:15</text>

    <!-- Row 2 -->
    <rect x="170" y="158" width="390" height="24" fill="transparent"/>
    <text x="200" y="174" class="sans" font-size="12" fill="#a0a0a0">📁 Archive</text>
    <text x="375" y="174" text-anchor="end" class="sans" font-size="11" fill="#888888">—</text>
    <text x="455" y="174" class="sans" font-size="11" fill="#888888">Mar 14 17:30</text>

    <!-- Row 3 (hover) -->
    <rect x="170" y="182" width="390" height="24" fill="#383838"/>
    <text x="200" y="198" class="sans" font-size="12" fill="#e0e0e0">📄 notes.txt</text>
    <text x="375" y="198" text-anchor="end" class="sans" font-size="11" fill="#c0c0c0">4.2 KB</text>
    <text x="455" y="198" class="sans" font-size="11" fill="#c0c0c0">Apr 22 11:00</text>

    <!-- Row 4 -->
    <rect x="170" y="206" width="390" height="24" fill="transparent"/>
    <text x="200" y="222" class="sans" font-size="12" fill="#a0a0a0">📄 resume.pdf</text>
    <text x="375" y="222" text-anchor="end" class="sans" font-size="11" fill="#888888">218 KB</text>
    <text x="455" y="222" class="sans" font-size="11" fill="#888888">Jan 05 14:22</text>

    <!-- Row 5 -->
    <rect x="170" y="230" width="390" height="24" fill="transparent"/>
    <text x="200" y="246" class="sans" font-size="12" fill="#a0a0a0">🎵 playlist.m3u</text>
    <text x="375" y="246" text-anchor="end" class="sans" font-size="11" fill="#888888">1.1 KB</text>
    <text x="455" y="246" class="sans" font-size="11" fill="#888888">Feb 18 20:10</text>

    <!-- Row 6 -->
    <rect x="170" y="254" width="390" height="24" fill="transparent"/>
    <text x="200" y="270" class="sans" font-size="12" fill="#a0a0a0">🖼 wallpaper.png</text>
    <text x="375" y="270" text-anchor="end" class="sans" font-size="11" fill="#888888">3.4 MB</text>
    <text x="455" y="270" class="sans" font-size="11" fill="#888888">Mar 31 08:44</text>

    <!-- Row 7 -->
    <rect x="170" y="278" width="390" height="24" fill="transparent"/>
    <text x="200" y="294" class="sans" font-size="12" fill="#a0a0a0">📦 backup.tar.gz</text>
    <text x="375" y="294" text-anchor="end" class="sans" font-size="11" fill="#888888">142 MB</text>
    <text x="455" y="294" class="sans" font-size="11" fill="#888888">Apr 01 23:55</text>

    <!-- Row 8 -->
    <rect x="170" y="302" width="390" height="24" fill="transparent"/>
    <text x="200" y="318" class="sans" font-size="12" fill="#a0a0a0">📄 config.yaml</text>
    <text x="375" y="318" text-anchor="end" class="sans" font-size="11" fill="#888888">872 B</text>
    <text x="455" y="318" class="sans" font-size="11" fill="#888888">Apr 10 16:20</text>

    <!-- Status bar -->
    <rect x="30" y="430" width="530" height="0" fill="#252525"/>
    <rect x="170" y="402" width="390" height="28" fill="#252525" stroke="#404040" stroke-width="0.5"/>
    <text x="182" y="420" class="sans" font-size="11" fill="#888888">8 items — 1 selected (Projects, folder)</text>

    <!-- Scrollbar -->
    <rect x="551" y="134" width="9" height="296" rx="4" fill="#1e1e1e"/>
    <rect x="551" y="134" width="9" height="80" rx="4" fill="#555555"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SETTINGS / DIALOG WINDOW                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body -->
    <rect x="590" y="60" width="278" height="340" rx="6" ry="6" fill="#2d2d2d" stroke="#404040" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="590" y="60" width="278" height="34" rx="6" ry="6" fill="#252525" stroke="#404040" stroke-width="1"/>
    <rect x="590" y="80" width="278" height="14" fill="#252525"/>

    <!-- Buttons -->
    <circle cx="611" cy="77" r="7" fill="#cf6679"/>
    <circle cx="631" cy="77" r="7" fill="#e5a050"/>
    <circle cx="651" cy="77" r="7" fill="#4caf50"/>

    <!-- Title -->
    <text x="729" y="82" text-anchor="middle" class="sans" font-size="13" fill="#e0e0e0">Appearance</text>

    <!-- Content area -->
    <rect x="590" y="94" width="278" height="306" fill="#2d2d2d"/>

    <!-- Section: Theme -->
    <text x="608" y="116" class="sans" font-size="11" fill="#888888" letter-spacing="1">THEME</text>
    <rect x="608" y="122" width="242" height="36" rx="4" fill="#1e1e1e" stroke="#5294e2" stroke-width="1"/>
    <text x="622" y="145" class="sans" font-size="13" fill="#e0e0e0">Deskthem</text>
    <text x="838" y="145" text-anchor="end" class="sans" font-size="11" fill="#8a8a8a">▾</text>

    <!-- Section: Accent color -->
    <text x="608" y="178" class="sans" font-size="11" fill="#888888" letter-spacing="1">ACCENT COLOUR</text>
    <circle cx="622" cy="198" r="10" fill="#5294e2" stroke="#e0e0e0" stroke-width="2"/>
    <circle cx="648" cy="198" r="10" fill="#cf6679"/>
    <circle cx="674" cy="198" r="10" fill="#4caf50"/>
    <circle cx="700" cy="198" r="10" fill="#e5a050"/>
    <circle cx="726" cy="198" r="10" fill="#9c6cd4"/>

    <!-- Section: Font -->
    <text x="608" y="228" class="sans" font-size="11" fill="#888888" letter-spacing="1">FONT</text>
    <rect x="608" y="234" width="242" height="36" rx="4" fill="#383838" stroke="#404040" stroke-width="1"/>
    <text x="622" y="257" class="sans" font-size="13" fill="#e0e0e0">DejaVu Sans  11</text>
    <text x="838" y="257" text-anchor="end" class="sans" font-size="11" fill="#8a8a8a">▾</text>

    <!-- Section: Toggles -->
    <text x="608" y="292" class="sans" font-size="11" fill="#888888" letter-spacing="1">OPTIONS</text>

    <text x="622" y="316" class="sans" font-size="12" fill="#e0e0e0">Dark mode</text>
    <!-- Toggle ON -->
    <rect x="795" y="306" width="36" height="18" rx="9" fill="#5294e2"/>
    <circle cx="822" cy="315" r="7" fill="#ffffff"/>

    <text x="622" y="342" class="sans" font-size="12" fill="#e0e0e0">Window animations</text>
    <!-- Toggle OFF -->
    <rect x="795" y="332" width="36" height="18" rx="9" fill="#555555"/>
    <circle cx="804" cy="341" r="7" fill="#aaaaaa"/>

    <!-- Dialog buttons -->
    <rect x="590" y="370" width="278" height="30" fill="#252525" stroke="#404040" stroke-width="0.5"/>
    <rect x="690" y="377" width="70" height="17" rx="4" fill="#5294e2"/>
    <text x="725" y="389" text-anchor="middle" class="sans" font-size="11" fill="#ffffff">Apply</text>
    <rect x="768" y="377" width="70" height="17" rx="4" fill="#383838" stroke="#404040" stroke-width="0.5"/>
    <text x="803" y="389" text-anchor="middle" class="sans" font-size="11" fill="#c0c0c0">Cancel</text>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TERMINAL WINDOW (bottom)                        -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body -->
    <rect x="30" y="460" width="840" height="84" rx="6" ry="6" fill="#1e1e1e" stroke="#404040" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="30" y="460" width="840" height="28" rx="6" ry="6" fill="#252525" stroke="#404040" stroke-width="1"/>
    <rect x="30" y="476" width="840" height="12" fill="#252525"/>

    <!-- Buttons -->
    <circle cx="51" cy="474" r="6" fill="#cf6679"/>
    <circle cx="70" cy="474" r="6" fill="#e5a050"/>
    <circle cx="89" cy="474" r="6" fill="#4caf50"/>

    <!-- Tab -->
    <rect x="108" y="462" width="110" height="26" rx="4" fill="#1e1e1e" stroke="#5294e2" stroke-width="1"/>
    <text x="163" y="478" text-anchor="middle" class="sans" font-size="11" fill="#e0e0e0">bash — user@host</text>
    <rect x="222" y="462" width="100" height="26" rx="4" fill="transparent"/>
    <text x="272" y="478" text-anchor="middle" class="sans" font-size="11" fill="#888888">vim config.yaml</text>

    <!-- Terminal content -->
    <rect x="30" y="488" width="840" height="56" fill="#1e1e1e"/>

    <text x="46" y="507" class="mono" font-size="12" fill="#4caf50">user@host</text>
    <text x="121" y="507" class="mono" font-size="12" fill="#e0e0e0">:</text>
    <text x="130" y="507" class="mono" font-size="12" fill="#5294e2">~</text>
    <text x="145" y="507" class="mono" font-size="12" fill="#e0e0e0">$</text>
    <text x="158" y="507" class="mono" font-size="12" fill="#e0e0e0">./install.sh --apply</text>

    <text x="46" y="527" class="mono" font-size="12" fill="#888888">✓ Detected: Arch Linux — GNOME</text>
    <text x="46" y="543" class="mono" font-size="12" fill="#5294e2">→</text>
    <text x="58" y="543" class="mono" font-size="12" fill="#e0e0e0">Applying Deskthem...</text>
    <!-- Cursor blink placeholder -->
    <rect x="214" y="530" width="8" height="14" fill="#e0e0e0" opacity="0.8"/>
  </g>

  <!-- Label -->
  <text x="450" y="555" text-anchor="middle" class="sans" font-size="11" fill="#555555">Deskthem — Dark Theme Suite for Linux</text>
</svg>
