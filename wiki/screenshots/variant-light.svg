<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .sans { font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8d0e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8c4d8;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Desktop background — light blue-grey -->
  <rect width="900" height="560" fill="url(#deskGrad)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FILE MANAGER WINDOW — Full Light                -->
  <!-- All surfaces light — consistent light palette  -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body — all light -->
    <rect x="30" y="30" width="560" height="420" rx="6" ry="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1"/>

    <!-- Header bar — light chrome -->
    <rect x="30" y="30" width="560" height="38" rx="6" ry="6" fill="#ebebeb" stroke="#d0d0d0" stroke-width="1"/>
    <rect x="30" y="54" width="560" height="14" fill="#ebebeb"/>
    <!-- Traffic-light buttons -->
    <circle cx="54" cy="49" r="7" fill="#cf6679"/>
    <circle cx="76" cy="49" r="7" fill="#e5a050"/>
    <circle cx="98" cy="49" r="7" fill="#4caf50"/>
    <!-- Title — dark text on light bar -->
    <text x="310" y="54" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#2d2d2d">Files — Home</text>

    <!-- Toolbar — light chrome -->
    <rect x="30" y="68" width="560" height="34" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <!-- Nav buttons -->
    <rect x="40" y="76" width="26" height="18" rx="4" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="53" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">‹</text>
    <rect x="70" y="76" width="26" height="18" rx="4" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="83" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">›</text>
    <rect x="100" y="76" width="26" height="18" rx="4" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="113" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">↑</text>
    <!-- Location bar — white input -->
    <rect x="136" y="76" width="290" height="18" rx="4" fill="#ffffff" stroke="#5294e2" stroke-width="1"/>
    <text x="148" y="89" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#2d2d2d">/home/user/Documents</text>
    <rect x="432" y="76" width="60" height="18" rx="4" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="462" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">⌕ Search</text>

    <!-- Sidebar — light panel -->
    <rect x="30" y="102" width="140" height="318" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <!-- Sidebar items -->
    <rect x="30" y="138" width="140" height="22" fill="#5294e2" fill-opacity="0.15"/>
    <rect x="30" y="138" width="3" height="22" fill="#5294e2"/>
    <text x="50" y="120" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">PLACES</text>
    <text x="50" y="154" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#2d2d2d">🏠 Home</text>
    <text x="50" y="178" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🖥 Desktop</text>
    <text x="50" y="202" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">📄 Documents</text>
    <text x="50" y="226" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">⬇ Downloads</text>
    <text x="50" y="250" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🎵 Music</text>
    <text x="50" y="274" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🖼 Pictures</text>
    <text x="50" y="298" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🎬 Videos</text>
    <text x="50" y="330" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">DEVICES</text>
    <text x="50" y="350" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">💾 128 GB Drive</text>
    <text x="50" y="374" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">📀 USB Drive</text>

    <!-- Main content area — LIGHT (consistent throughout) -->
    <rect x="170" y="102" width="420" height="318" fill="#ffffff"/>

    <!-- File list header — slightly darker light -->
    <rect x="170" y="102" width="420" height="22" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="190" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Name</text>
    <text x="400" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Size</text>
    <text x="480" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Modified</text>

    <!-- File rows — white background -->
    <!-- Row 1 — selected -->
    <rect x="170" y="124" width="420" height="22" fill="#5294e2" fill-opacity="0.15"/>
    <rect x="170" y="124" width="420" height="22" stroke="#5294e2" stroke-width="0.5" fill="none"/>
    <text x="200" y="139" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#2d2d2d">📁 Projects</text>
    <text x="395" y="139" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">—</text>
    <text x="476" y="139" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">Apr 20 09:15</text>

    <rect x="170" y="146" width="420" height="22" fill="transparent"/>
    <text x="200" y="161" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">📁 Archive</text>
    <text x="395" y="161" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">—</text>
    <text x="476" y="161" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Mar 14 17:30</text>

    <!-- Row 3 hover — light hover -->
    <rect x="170" y="168" width="420" height="22" fill="#ececec"/>
    <text x="200" y="183" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#2d2d2d">📄 notes.txt</text>
    <text x="395" y="183" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">4.2 KB</text>
    <text x="476" y="183" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#555555">Apr 22 11:00</text>

    <rect x="170" y="190" width="420" height="22" fill="transparent"/>
    <text x="200" y="205" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">📄 resume.pdf</text>
    <text x="395" y="205" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">218 KB</text>
    <text x="476" y="205" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Jan 05 14:22</text>

    <rect x="170" y="212" width="420" height="22" fill="transparent"/>
    <text x="200" y="227" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🎵 playlist.m3u</text>
    <text x="395" y="227" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">1.1 KB</text>
    <text x="476" y="227" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Feb 18 20:10</text>

    <rect x="170" y="234" width="420" height="22" fill="transparent"/>
    <text x="200" y="249" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">🖼 wallpaper.png</text>
    <text x="395" y="249" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">3.4 MB</text>
    <text x="476" y="249" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Mar 31 08:44</text>

    <rect x="170" y="256" width="420" height="22" fill="transparent"/>
    <text x="200" y="271" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#555555">📦 backup.tar.gz</text>
    <text x="395" y="271" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">142 MB</text>
    <text x="476" y="271" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">Apr 01 23:55</text>

    <!-- Status bar — light -->
    <rect x="170" y="390" width="420" height="30" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="0.5"/>
    <text x="182" y="409" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">8 items — 1 selected (Projects, folder)</text>

    <!-- Scrollbar — light -->
    <rect x="582" y="124" width="8" height="286" rx="4" fill="#e0e0e0"/>
    <rect x="582" y="124" width="8" height="80" rx="4" fill="#aaaaaa"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SETTINGS DIALOG — Full Light                    -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body — light -->
    <rect x="618" y="30" width="262" height="360" rx="6" ry="6" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1"/>
    <!-- Header bar — light chrome -->
    <rect x="618" y="30" width="262" height="38" rx="6" ry="6" fill="#ebebeb" stroke="#d0d0d0" stroke-width="1"/>
    <rect x="618" y="54" width="262" height="14" fill="#ebebeb"/>
    <circle cx="638" cy="49" r="7" fill="#cf6679"/>
    <circle cx="660" cy="49" r="7" fill="#e5a050"/>
    <circle cx="682" cy="49" r="7" fill="#4caf50"/>
    <text x="749" y="54" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#2d2d2d">Appearance</text>

    <!-- Content — LIGHT -->
    <rect x="618" y="68" width="262" height="322" fill="#f5f5f5"/>

    <text x="636" y="96" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">THEME</text>
    <rect x="636" y="102" width="226" height="32" rx="4" fill="#ffffff" stroke="#5294e2" stroke-width="1"/>
    <text x="650" y="122" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#2d2d2d">Simplicity-Light</text>
    <text x="850" y="122" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#888888">▾</text>

    <text x="636" y="158" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">ACCENT COLOUR</text>
    <circle cx="650" cy="178" r="10" fill="#5294e2" stroke="#2d2d2d" stroke-width="2"/>
    <circle cx="676" cy="178" r="10" fill="#cf6679"/>
    <circle cx="702" cy="178" r="10" fill="#4caf50"/>
    <circle cx="728" cy="178" r="10" fill="#e5a050"/>
    <circle cx="754" cy="178" r="10" fill="#9c6cd4"/>

    <text x="636" y="210" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">FONT</text>
    <rect x="636" y="216" width="226" height="32" rx="4" fill="#ffffff" stroke="#d0d0d0" stroke-width="1"/>
    <text x="650" y="236" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#2d2d2d">DejaVu Sans  11</text>

    <text x="636" y="270" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888" letter-spacing="1">OPTIONS</text>
    <text x="650" y="294" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#2d2d2d">Dark mode</text>
    <rect x="795" y="284" width="36" height="18" rx="9" fill="#cccccc"/>
    <circle cx="804" cy="293" r="7" fill="#f5f5f5"/>
    <text x="650" y="320" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#2d2d2d">Window animations</text>
    <rect x="795" y="310" width="36" height="18" rx="9" fill="#5294e2"/>
    <circle cx="822" cy="319" r="7" fill="#ffffff"/>

    <!-- Button row — light -->
    <rect x="618" y="350" width="262" height="40" fill="#ebebeb" stroke="#d0d0d0" stroke-width="0.5"/>
    <rect x="700" y="358" width="70" height="22" rx="4" fill="#5294e2"/>
    <text x="735" y="373" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#ffffff">Apply</text>
    <rect x="778" y="358" width="70" height="22" rx="4" fill="#e8e8e8" stroke="#d0d0d0" stroke-width="1"/>
    <text x="813" y="373" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#2d2d2d">Cancel</text>
  </g>

  <!-- Label -->
  <text x="450" y="556" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#666666">Simplicity-Light — Full light variant (GTK 3)</text>
</svg>
