  <!-- bg_color #282a36 -->
  <rect x="80" y="514" width="100" height="52" rx="5" fill="#282a36" stroke="#44475a" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="537" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#f8f8f2">Background</text>
  <text x="130" y="553" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4">#282a36</text>

  <!-- dark_bg #21222c -->
  <rect x="194" y="514" width="100" height="52" rx="5" fill="#21222c" stroke="#44475a" stroke-width="1" filter="url(#shadow)"/>
  <text x="244" y="537" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#f8f8f2">Dark BG</text>
  <text x="244" y="553" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4">#21222c</text>

  <!-- base_color #1e1f29 -->
  <rect x="308" y="514" width="100" height="52" rx="5" fill="#1e1f29" stroke="#44475a" stroke-width="1" filter="url(#shadow)"/>
  <text x="358" y="537" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#f8f8f2">Base</text>
  <text x="358" y="553" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4">#1e1f29</text>

