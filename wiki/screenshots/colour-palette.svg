  <text x="244" y="253" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#252525</text>

  <!-- base_color #1e1e1e -->
  <rect x="308" y="214" width="100" height="52" rx="5" fill="#1e1e1e" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
  <text x="358" y="237" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#e0e0e0">Base</text>
  <text x="358" y="253" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#1e1e1e</text>

  <!-- fg_color #e0e0e0 -->
  <rect x="422" y="214" width="100" height="52" rx="5" fill="#e0e0e0" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
  <text x="472" y="237" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#2d2d2d">Foreground</text>
  <text x="472" y="253" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#2d2d2d">#e0e0e0</text>

