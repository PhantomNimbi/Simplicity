<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <style>
      .sans { font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">Simplicity — Colour Palette</text>
  <line x1="80" y1="50" x2="820" y2="50" stroke="#404040" stroke-width="1"/>

  <!-- ══════════════════════════════ -->
  <!-- SHARED ACCENT COLOURS        -->
  <!-- ══════════════════════════════ -->
  <text x="80" y="80" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#888888" letter-spacing="1">ACCENT &amp; STATE COLOURS  (shared across all variants)</text>

  <!-- Accent / Selected — #5294e2 -->
  <rect x="80" y="90" width="120" height="60" rx="6" fill="#5294e2" filter="url(#shadow)"/>
  <text x="140" y="116" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Accent</text>
  <text x="140" y="133" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">#5294e2</text>
  <text x="140" y="164" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">Selection · Focus · Links</text>

  <!-- Error / Close — #cf6679 -->
  <rect x="220" y="90" width="120" height="60" rx="6" fill="#cf6679" filter="url(#shadow)"/>
  <text x="280" y="116" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Error</text>
  <text x="280" y="133" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">#cf6679</text>
  <text x="280" y="164" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">Error · Close button</text>

  <!-- Warning / Min — #e5a050 -->
  <rect x="360" y="90" width="120" height="60" rx="6" fill="#e5a050" filter="url(#shadow)"/>
  <text x="420" y="116" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Warning</text>
  <text x="420" y="133" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">#e5a050</text>
  <text x="420" y="164" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">Warning · Minimise btn</text>

  <!-- Success / Max — #4caf50 -->
  <rect x="500" y="90" width="120" height="60" rx="6" fill="#4caf50" filter="url(#shadow)"/>
  <text x="560" y="116" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Success</text>
  <text x="560" y="133" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">#4caf50</text>
  <text x="560" y="164" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">Success · Maximise btn</text>

  <!-- Link — #1a6bbf -->
  <rect x="640" y="90" width="120" height="60" rx="6" fill="#1a6bbf" filter="url(#shadow)"/>
  <text x="700" y="116" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Link</text>
  <text x="700" y="133" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">#1a6bbf</text>
  <text x="700" y="164" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">Hyperlinks (light variant)</text>

  <line x1="80" y1="180" x2="820" y2="180" stroke="#404040" stroke-width="1"/>

