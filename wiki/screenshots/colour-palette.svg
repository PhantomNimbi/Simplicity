  <rect x="80" y="214" width="100" height="52" rx="5" fill="#2d2d2d" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="237" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#e0e0e0">Background</text>
  <text x="130" y="253" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#2d2d2d</text>

  <!-- dark_bg #252525 -->
  <rect x="194" y="214" width="100" height="52" rx="5" fill="#252525" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
