  <rect x="422" y="514" width="100" height="52" rx="5" fill="#f8f8f2" stroke="#44475a" stroke-width="1" filter="url(#shadow)"/>
  <text x="472" y="537" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#282a36">Foreground</text>
  <text x="472" y="553" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#282a36">#f8f8f2</text>

