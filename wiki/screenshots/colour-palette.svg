  <rect x="80" y="414" width="130" height="52" rx="5" fill="#252525" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
  <text x="145" y="437" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#e0e0e0">Header BG</text>
  <text x="145" y="453" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#252525</text>

  <rect x="224" y="414" width="130" height="52" rx="5" fill="#2a2a2a" stroke="#404040" stroke-width="1" filter="url(#shadow)"/>
  <text x="289" y="437" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#e0e0e0">Sidebar BG</text>
  <text x="289" y="453" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#2a2a2a</text>

  <rect x="368" y="414" width="130" height="52" rx="5" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1" filter="url(#shadow)"/>
  <text x="433" y="437" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#2d2d2d">Content BG</text>
  <text x="433" y="453" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#f5f5f5</text>

  <rect x="512" y="414" width="130" height="52" rx="5" fill="#e0e0e0" stroke="#d0d0d0" stroke-width="1" filter="url(#shadow)"/>
  <text x="577" y="437" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#2d2d2d">Header FG</text>
  <text x="577" y="453" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#888888">#e0e0e0</text>

  <rect x="656" y="414" width="130" height="52" rx="5" fill="#2d2d2d" stroke="#d0d0d0" stroke-width="1" filter="url(#shadow)"/>
  <text x="721" y="437" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#f5f5f5">Content FG</text>
  <text x="721" y="453" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#aaaaaa">#2d2d2d</text>

  <line x1="80" y1="480" x2="820" y2="480" stroke="#404040" stroke-width="1"/>

