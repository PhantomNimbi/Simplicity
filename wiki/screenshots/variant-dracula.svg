<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <style>
      .sans { font-family: 'DejaVu Sans', 'Segoe UI', Arial, sans-serif; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0e17;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#191a21;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Desktop background — deep Dracula navy -->
  <rect width="900" height="560" fill="url(#deskGrad)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FILE MANAGER WINDOW — Dracula                   -->
  <!-- Deep navy backgrounds + purple accent           -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body — Dracula bg -->
    <rect x="30" y="30" width="560" height="420" rx="6" ry="6" fill="#282a36" stroke="#44475a" stroke-width="1"/>

    <!-- Header bar — darker Dracula chrome -->
    <rect x="30" y="30" width="560" height="38" rx="6" ry="6" fill="#21222c" stroke="#44475a" stroke-width="1"/>
    <rect x="30" y="54" width="560" height="14" fill="#21222c"/>
    <!-- Traffic-light buttons (Dracula palette) -->
    <circle cx="54" cy="49" r="7" fill="#ff5555"/>
    <circle cx="76" cy="49" r="7" fill="#ffb86c"/>
    <circle cx="98" cy="49" r="7" fill="#50fa7b"/>
    <!-- Title -->
    <text x="310" y="54" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#f8f8f2">Files — Home</text>

    <!-- Toolbar — Dracula chrome -->
    <rect x="30" y="68" width="560" height="34" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <!-- Nav buttons -->
    <rect x="40" y="76" width="26" height="18" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="53" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">‹</text>
    <rect x="70" y="76" width="26" height="18" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="83" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">›</text>
    <rect x="100" y="76" width="26" height="18" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="113" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">↑</text>
    <!-- Location bar — Dracula base input -->
    <rect x="136" y="76" width="290" height="18" rx="4" fill="#1e1f29" stroke="#bd93f9" stroke-width="1"/>
    <text x="148" y="89" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#f8f8f2">/home/user/Documents</text>
    <rect x="432" y="76" width="60" height="18" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="0.5"/>
    <text x="462" y="89" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">⌕ Search</text>

    <!-- Sidebar — darker Dracula panel -->
    <rect x="30" y="102" width="140" height="318" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <!-- Sidebar items -->
    <rect x="30" y="138" width="140" height="22" fill="#bd93f9" fill-opacity="0.20"/>
    <rect x="30" y="138" width="3" height="22" fill="#bd93f9"/>
    <text x="50" y="120" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">PLACES</text>
    <text x="50" y="154" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#f8f8f2">🏠 Home</text>
    <text x="50" y="178" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🖥 Desktop</text>
    <text x="50" y="202" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">📄 Documents</text>
    <text x="50" y="226" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">⬇ Downloads</text>
    <text x="50" y="250" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🎵 Music</text>
    <text x="50" y="274" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🖼 Pictures</text>
    <text x="50" y="298" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🎬 Videos</text>
    <text x="50" y="330" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">DEVICES</text>
    <text x="50" y="350" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">💾 128 GB Drive</text>
    <text x="50" y="374" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">📀 USB Drive</text>

    <!-- Main content area — Dracula background -->
    <rect x="170" y="102" width="420" height="318" fill="#282a36"/>

    <!-- File list header — slightly darker -->
    <rect x="170" y="102" width="420" height="22" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <text x="190" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Name</text>
    <text x="400" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Size</text>
    <text x="480" y="117" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Modified</text>

    <!-- File rows — Dracula background -->
    <!-- Row 1 — selected with purple accent -->
    <rect x="170" y="124" width="420" height="22" fill="#bd93f9" fill-opacity="0.15"/>
    <rect x="170" y="124" width="420" height="22" stroke="#bd93f9" stroke-width="0.5" fill="none"/>
    <text x="200" y="139" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#f8f8f2">📁 Projects</text>
    <text x="395" y="139" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#cdd6f4">—</text>
    <text x="476" y="139" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#cdd6f4">Apr 20 09:15</text>

    <rect x="170" y="146" width="420" height="22" fill="transparent"/>
    <text x="200" y="161" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">📁 Archive</text>
    <text x="395" y="161" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">—</text>
    <text x="476" y="161" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Mar 14 17:30</text>

    <!-- Row 3 hover — slightly lighter Dracula -->
    <rect x="170" y="168" width="420" height="22" fill="#383a4b"/>
    <text x="200" y="183" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#f8f8f2">📄 notes.txt</text>
    <text x="395" y="183" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#cdd6f4">4.2 KB</text>
    <text x="476" y="183" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#cdd6f4">Apr 22 11:00</text>

    <rect x="170" y="190" width="420" height="22" fill="transparent"/>
    <text x="200" y="205" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">📄 resume.pdf</text>
    <text x="395" y="205" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">218 KB</text>
    <text x="476" y="205" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Jan 05 14:22</text>

    <rect x="170" y="212" width="420" height="22" fill="transparent"/>
    <text x="200" y="227" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🎵 playlist.m3u</text>
    <text x="395" y="227" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">1.1 KB</text>
    <text x="476" y="227" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Feb 18 20:10</text>

    <rect x="170" y="234" width="420" height="22" fill="transparent"/>
    <text x="200" y="249" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">🖼 wallpaper.png</text>
    <text x="395" y="249" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">3.4 MB</text>
    <text x="476" y="249" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Mar 31 08:44</text>

    <rect x="170" y="256" width="420" height="22" fill="transparent"/>
    <text x="200" y="271" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#6272a4">📦 backup.tar.gz</text>
    <text x="395" y="271" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">142 MB</text>
    <text x="476" y="271" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Apr 01 23:55</text>

    <!-- Status bar — dark Dracula -->
    <rect x="170" y="390" width="420" height="30" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <text x="182" y="409" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">8 items — 1 selected (Projects, folder)</text>

    <!-- Scrollbar — Dracula -->
    <rect x="582" y="124" width="8" height="286" rx="4" fill="#1e1f29"/>
    <rect x="582" y="124" width="8" height="80" rx="4" fill="#44475a"/>
  </g>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SETTINGS DIALOG — Dracula                       -->
  <!-- ═══════════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <!-- Window body — Dracula -->
    <rect x="618" y="30" width="262" height="360" rx="6" ry="6" fill="#282a36" stroke="#44475a" stroke-width="1"/>
    <!-- Header bar — darker Dracula chrome -->
    <rect x="618" y="30" width="262" height="38" rx="6" ry="6" fill="#21222c" stroke="#44475a" stroke-width="1"/>
    <rect x="618" y="54" width="262" height="14" fill="#21222c"/>
    <circle cx="638" cy="49" r="7" fill="#ff5555"/>
    <circle cx="660" cy="49" r="7" fill="#ffb86c"/>
    <circle cx="682" cy="49" r="7" fill="#50fa7b"/>
    <text x="749" y="54" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#f8f8f2">Appearance</text>

    <!-- Content — Dracula -->
    <rect x="618" y="68" width="262" height="322" fill="#282a36"/>

    <text x="636" y="96" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">THEME</text>
    <rect x="636" y="102" width="226" height="32" rx="4" fill="#1e1f29" stroke="#bd93f9" stroke-width="1"/>
    <text x="650" y="122" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#f8f8f2">Simplicity-Dracula</text>
    <text x="850" y="122" text-anchor="end" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">▾</text>

    <text x="636" y="158" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">ACCENT COLOUR</text>
    <circle cx="650" cy="178" r="10" fill="#bd93f9" stroke="#f8f8f2" stroke-width="2"/>
    <circle cx="676" cy="178" r="10" fill="#ff5555"/>
    <circle cx="702" cy="178" r="10" fill="#50fa7b"/>
    <circle cx="728" cy="178" r="10" fill="#ffb86c"/>
    <circle cx="754" cy="178" r="10" fill="#8be9fd"/>

    <text x="636" y="210" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">FONT</text>
    <rect x="636" y="216" width="226" height="32" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="1"/>
    <text x="650" y="236" font-family="'DejaVu Sans',Arial,sans-serif" font-size="13" fill="#f8f8f2">DejaVu Sans  11</text>

    <text x="636" y="270" font-family="'DejaVu Sans',Arial,sans-serif" font-size="10" fill="#6272a4" letter-spacing="1">OPTIONS</text>
    <text x="650" y="294" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#f8f8f2">Dark mode</text>
    <rect x="795" y="284" width="36" height="18" rx="9" fill="#bd93f9"/>
    <circle cx="822" cy="293" r="7" fill="#ffffff"/>
    <text x="650" y="320" font-family="'DejaVu Sans',Arial,sans-serif" font-size="12" fill="#f8f8f2">Window animations</text>
    <rect x="795" y="310" width="36" height="18" rx="9" fill="#44475a"/>
    <circle cx="804" cy="319" r="7" fill="#6272a4"/>

    <!-- Button row — Dracula -->
    <rect x="618" y="350" width="262" height="40" fill="#21222c" stroke="#44475a" stroke-width="0.5"/>
    <rect x="700" y="358" width="70" height="22" rx="4" fill="#bd93f9"/>
    <text x="735" y="373" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#282a36">Apply</text>
    <rect x="778" y="358" width="70" height="22" rx="4" fill="#383a4b" stroke="#44475a" stroke-width="1"/>
    <text x="813" y="373" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#6272a4">Cancel</text>
  </g>

  <!-- Label -->
  <text x="450" y="556" text-anchor="middle" font-family="'DejaVu Sans',Arial,sans-serif" font-size="11" fill="#44475a">Simplicity-Dracula — Dracula colour palette (GTK 3)</text>
</svg>
