name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            IS_PRERELEASE="${{ inputs.prerelease }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            IS_PRERELEASE="false"
            if [[ "${VERSION}" == *-* ]]; then
              IS_PRERELEASE="true"
            fi
          fi
          VERSION_BARE="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION_BARE=${VERSION_BARE}" >> "$GITHUB_OUTPUT"
          echo "IS_PRERELEASE=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.VERSION }}" \
            -m "Simplicity ${{ steps.version.outputs.VERSION }}"
          git push origin "${{ steps.version.outputs.VERSION }}"

      - name: Build release archives
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE_BASE="Simplicity-${VERSION}"

          mkdir -p "dist/${ARCHIVE_BASE}"
          cp -r simplicity/. "dist/${ARCHIVE_BASE}/"
          cp install.sh uninstall.sh README.md LICENSE "dist/${ARCHIVE_BASE}/"
          cp -r scripts distros "dist/${ARCHIVE_BASE}/"
          if [[ -f CHANGELOG.md ]]; then
            cp CHANGELOG.md "dist/${ARCHIVE_BASE}/"
          fi

          tar -czf "dist/${ARCHIVE_BASE}.tar.gz" -C dist "${ARCHIVE_BASE}"
          (cd dist && zip -r "${ARCHIVE_BASE}.zip" "${ARCHIVE_BASE}")

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION_BARE="${{ steps.version.outputs.VERSION_BARE }}"
          if [[ -f CHANGELOG.md ]]; then
            python3 - "$VERSION_BARE" CHANGELOG.md << 'PYEOF'
          import re, sys
          version, path = sys.argv[1], sys.argv[2]
          content = open(path).read()
          pattern = rf'(## \[{re.escape(version)}\][^\n]*\n.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          entry = match.group(1).strip() if match else ""
          with open('/tmp/changelog-entry.md', 'w') as f:
              f.write(entry)
          PYEOF
          else
            touch /tmp/changelog-entry.md
          fi

      - name: Generate release notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG_ENTRY="$(cat /tmp/changelog-entry.md)"

          {
            echo "## Simplicity ${VERSION}"
            echo ""
            echo "A clean, modern dark theme suite for Linux desktop environments,"
            echo "featuring full GTK 2 / 3 / 4 support, three window-manager themes,"
            echo "and dedicated installers for 6+ major Linux distributions."
            echo ""
            echo "---"
            echo ""
            echo "### 🚀 Quick Install"
            echo ""
            echo "**From archive:**"
            echo '```bash'
            echo "tar -xzf Simplicity-${VERSION}.tar.gz"
            echo "cd Simplicity-${VERSION}"
            echo "chmod +x install.sh"
            echo "./install.sh"
            echo '```'
            echo ""
            echo "**From source (git clone):**"
            echo '```bash'
            echo "git clone https://github.com/PhantomNimbi/Deskthem.git"
            echo "cd Deskthem"
            echo "./install.sh"
            echo '```'
            echo ""
            echo "**Manual (theme files only):**"
            echo '```bash'
            echo "unzip Simplicity-${VERSION}.zip"
            echo "cp -r Simplicity-${VERSION}/simplicity ~/.themes/Simplicity"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "### 📋 Installer Options"
            echo ""
            echo '```'
            echo "./install.sh [OPTIONS]"
            echo "  --system      Install to /usr/share/themes (requires root)"
            echo "  --no-apply    Install files only; do not apply to current session"
            echo "  --help        Show help"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "### 🖥️ Supported Desktop Environments"
            echo ""
            echo "| Desktop | GTK 2 | GTK 3 | GTK 4 | WM Theme |"
            echo "|---------|:-----:|:-----:|:-----:|:--------:|"
            echo "| GNOME | ✅ | ✅ | ✅ | Metacity |"
            echo "| XFCE | ✅ | ✅ | — | XFWM4 |"
            echo "| MATE | ✅ | ✅ | — | Metacity |"
            echo "| Cinnamon | ✅ | ✅ | — | Metacity |"
            echo "| KDE Plasma | ✅ | ✅ | ✅ | — |"
            echo "| Openbox / LXDE / LXQt | ✅ | ✅ | — | Openbox |"
            echo "| i3 / Sway | ✅ | ✅ | ✅ | — |"
            echo ""
            echo "---"
            echo ""
            echo "### 🐧 Supported Linux Distributions"
            echo ""
            echo "| Distribution | Installer | Package Manager |"
            echo "|-------------|-----------|-----------------|"
            echo "| Ubuntu · Linux Mint · Pop!\_OS | \`distros/ubuntu/\` | apt |"
            echo "| Debian · MX Linux · Kali Linux | \`distros/debian/\` | apt |"
            echo "| Fedora · RHEL · CentOS · AlmaLinux | \`distros/fedora/\` | dnf |"
            echo "| Arch Linux · EndeavourOS · Garuda | \`distros/arch/\` | pacman / yay |"
            echo "| Manjaro | \`distros/manjaro/\` | pamac / pacman |"
            echo "| openSUSE Leap / Tumbleweed | \`distros/opensuse/\` | zypper |"
            echo ""
            echo "---"
            echo ""
            echo "### 🎨 Colour Palette"
            echo ""
            echo "| Role | Colour |"
            echo "|------|--------|"
            echo "| Background | \`#2d2d2d\` |"
            echo "| Dark Background | \`#252525\` |"
            echo "| Base (inputs) | \`#1e1e1e\` |"
            echo "| Foreground | \`#e0e0e0\` |"
            echo "| Accent / Selected | \`#5294e2\` |"
            echo "| Error / Close btn | \`#cf6679\` |"
            echo "| Warning / Min btn | \`#e5a050\` |"
            echo "| Success / Max btn | \`#4caf50\` |"
            echo "| Borders | \`#404040\` |"
            echo ""
            echo "---"
            echo ""
            echo "### 📦 Release Assets"
            echo ""
            echo "| File | Description |"
            echo "|------|-------------|"
            echo "| \`Simplicity-${VERSION}.tar.gz\` | Full release archive (tar.gz) |"
            echo "| \`Simplicity-${VERSION}.zip\` | Full release archive (zip) |"
            echo ""
            echo "Both archives include: theme files (\`simplicity/\`), installer"
            echo "(\`install.sh\`), uninstaller (\`uninstall.sh\`), distro-specific"
            echo "scripts (\`distros/\`), helper scripts (\`scripts/\`), \`README.md\`,"
            echo "\`CHANGELOG.md\`, and \`LICENSE\`."
            echo ""
            echo "---"
            echo ""
            echo "### 🗑️ Uninstallation"
            echo ""
            echo '```bash'
            echo "./uninstall.sh"
            echo '```'
            echo ""
            echo "Or manually:"
            echo '```bash'
            echo "rm -rf ~/.themes/Simplicity"
            echo "gsettings reset org.gnome.desktop.interface gtk-theme"
            echo "gsettings reset org.gnome.desktop.wm.preferences theme"
            echo '```'
            if [[ -n "${CHANGELOG_ENTRY}" ]]; then
              echo ""
              echo "---"
              echo ""
              echo "### 📝 What's New"
              echo ""
              echo "${CHANGELOG_ENTRY}"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Simplicity ${{ steps.version.outputs.VERSION }}"
          body_path: /tmp/release-notes.md
          files: |
            dist/Simplicity-${{ steps.version.outputs.VERSION }}.tar.gz
            dist/Simplicity-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ fromJSON(steps.version.outputs.IS_PRERELEASE) }}
