<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="settingsBg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78909C"/>
      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
  </defs>
  <!-- App background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#settingsBg)"/>
  <!-- Gear: outer ring -->
  <circle cx="24" cy="24" r="11" fill="none" stroke="white" stroke-width="3.5" opacity="0.9"/>
  <!-- Gear: centre hub -->
  <circle cx="24" cy="24" r="4.5" fill="white" opacity="0.9"/>
  <!-- Gear teeth (8 small rectangles) -->
  <rect x="22" y="9"  width="4" height="5" rx="2" fill="white" opacity="0.9"/>
  <rect x="22" y="34" width="4" height="5" rx="2" fill="white" opacity="0.9"/>
  <rect x="9"  y="22" width="5" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="34" y="22" width="5" height="4" rx="2" fill="white" opacity="0.9"/>
  <rect x="11" y="11" width="4" height="5" rx="2" fill="white" opacity="0.9" transform="rotate(45,13,13.5)"/>
  <rect x="33" y="11" width="4" height="5" rx="2" fill="white" opacity="0.9" transform="rotate(-45,35,13.5)"/>
  <rect x="11" y="32" width="4" height="5" rx="2" fill="white" opacity="0.9" transform="rotate(-45,13,34.5)"/>
  <rect x="33" y="32" width="4" height="5" rx="2" fill="white" opacity="0.9" transform="rotate(45,35,34.5)"/>
</svg>
