<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="installBg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66BB6A"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- App background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#installBg)"/>
  <!-- Package box -->
  <rect x="13" y="10" width="22" height="18" rx="3" fill="white" opacity="0.9"/>
  <!-- Package cross lines -->
  <line x1="13" y1="17" x2="35" y2="17" stroke="#66BB6A" stroke-width="2" opacity="0.6"/>
  <line x1="24" y1="10" x2="24" y2="28" stroke="#66BB6A" stroke-width="2" opacity="0.6"/>
  <!-- Down arrow -->
  <line x1="24" y1="28" x2="24" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="18,35 24,42 30,35" fill="none" stroke="white" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
