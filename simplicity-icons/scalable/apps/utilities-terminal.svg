<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- App background (dark terminal) -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="#1E1E2E"/>
  <!-- Title bar strip -->
  <rect x="4" y="4" width="40" height="12" rx="10" fill="#2D2D3F"/>
  <rect x="4" y="10" width="40" height="6" fill="#2D2D3F"/>
  <!-- Traffic light dots -->
  <circle cx="13" cy="13" r="2.5" fill="#FF5F57"/>
  <circle cx="21" cy="13" r="2.5" fill="#FEBC2E"/>
  <circle cx="29" cy="13" r="2.5" fill="#28C840"/>
  <!-- Prompt chevron > -->
  <path d="M10 26 L17 30 L10 34" fill="none" stroke="#5294E2" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blinking cursor line -->
  <rect x="19" y="28.5" width="14" height="3" rx="1.5" fill="#5294E2" opacity="0.75"/>
</svg>
