<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="globeBg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29B6F6"/>
      <stop offset="1" stop-color="#0277BD"/>
    </linearGradient>
  </defs>
  <!-- App background -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#globeBg)"/>
  <!-- Globe outer circle -->
  <circle cx="24" cy="24" r="14" fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
  <!-- Equator line -->
  <line x1="10" y1="24" x2="38" y2="24" stroke="white" stroke-width="2" opacity="0.85"/>
  <!-- Vertical meridian (slightly elliptical) -->
  <ellipse cx="24" cy="24" rx="7" ry="14" fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
  <!-- Upper latitude arc -->
  <path d="M13 17 Q24 14 35 17" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Lower latitude arc -->
  <path d="M13 31 Q24 34 35 31" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
</svg>
