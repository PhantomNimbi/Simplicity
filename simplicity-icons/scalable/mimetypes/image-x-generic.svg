<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Document shape -->
  <path d="M8 4 L8 44 L40 44 L40 14 L30 4 Z" fill="white" stroke="#9E9E9E" stroke-width="1.5"/>
  <!-- Folded corner -->
  <path d="M30 4 L40 14 L30 14 Z" fill="#BBDEFB"/>
  <path d="M30 4 L30 14 L40 14" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
  <!-- Type colour bar at top -->
  <rect x="8" y="4" width="22" height="4" fill="#64B5F6" opacity="0.5"/>
  <!-- Landscape picture frame inside document -->
  <rect x="12" y="18" width="24" height="19" rx="2" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <!-- Sky gradient (blue) fills top of frame -->
  <rect x="12" y="18" width="24" height="10" rx="2" fill="#64B5F6" opacity="0.7"/>
  <!-- Mountains -->
  <polygon points="12,28 18,20 24,28" fill="#81C784" opacity="0.9"/>
  <polygon points="20,28 26,22 33,28" fill="#4CAF50" opacity="0.9"/>
  <!-- Sun -->
  <circle cx="31" cy="22" r="3" fill="#FFD04A" opacity="0.9"/>
</svg>
