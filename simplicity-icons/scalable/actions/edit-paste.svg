<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Clipboard body -->
  <rect x="8" y="12" width="32" height="30" rx="4" fill="#F5F5F5" stroke="#BDBDBD"
        stroke-width="1.5"/>
  <!-- Clipboard clip at top -->
  <rect x="18" y="8" width="12" height="8" rx="3" fill="#9E9E9E"/>
  <rect x="20" y="6" width="8" height="5" rx="2.5" fill="#757575"/>
  <!-- Lines on clipboard (representing pasted content) -->
  <line x1="14" y1="24" x2="34" y2="24" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="34" y2="30" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="36" x2="26" y2="36" stroke="#BDBDBD" stroke-width="2" stroke-linecap="round"/>
</svg>
