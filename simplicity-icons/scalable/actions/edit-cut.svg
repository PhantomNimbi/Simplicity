<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Scissors blades and handles -->
  <!-- Top blade -->
  <line x1="24" y1="24" x2="8"  y2="8"  stroke="#757575" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom blade -->
  <line x1="24" y1="24" x2="8"  y2="38" stroke="#757575" stroke-width="3" stroke-linecap="round"/>
  <!-- Top right blade direction -->
  <line x1="24" y1="24" x2="40" y2="10" stroke="#757575" stroke-width="3" stroke-linecap="round"/>
  <!-- Bottom right blade direction -->
  <line x1="24" y1="24" x2="40" y2="36" stroke="#757575" stroke-width="3" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="24" cy="24" r="3.5" fill="#9E9E9E"/>
  <!-- Handle circles -->
  <circle cx="8"  cy="8"  r="5" fill="none" stroke="#757575" stroke-width="3"/>
  <circle cx="8"  cy="38" r="5" fill="none" stroke="#757575" stroke-width="3"/>
</svg>
