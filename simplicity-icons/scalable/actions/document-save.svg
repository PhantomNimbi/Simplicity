<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Floppy disk body -->
  <rect x="6" y="6" width="36" height="36" rx="4" fill="#5294E2"/>
  <!-- Write-protect notch (top-right corner) -->
  <path d="M34 6 L42 6 L42 14 Z" fill="#3a74c2"/>
  <!-- Label area (lower portion) -->
  <rect x="10" y="24" width="28" height="14" rx="2" fill="white" opacity="0.9"/>
  <!-- Shutter slot (metal plate) -->
  <rect x="17" y="8" width="10" height="13" rx="1" fill="#90CAF9"/>
  <rect x="20" y="8" width="4" height="13" fill="#64B5F6"/>
</svg>
