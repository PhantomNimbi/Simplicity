<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Crumpled paper sticking out -->
  <rect x="18" y="4" width="12" height="10" rx="1" fill="#E0E0E0"/>
  <line x1="21" y1="7" x2="27" y2="7" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="21" y1="10" x2="27" y2="10" stroke="#9E9E9E" stroke-width="1"/>
  <!-- Lid (slightly open / tilted) -->
  <rect x="11" y="13" width="26" height="5" rx="2.5" fill="#616161"
        transform="rotate(-8,24,15.5)"/>
  <!-- Handle on lid -->
  <path d="M19 13 L19 11 Q19 9 24 9 Q29 9 29 11 L29 13" fill="none" stroke="#616161"
        stroke-width="2.5" stroke-linecap="round" transform="rotate(-8,24,13)"/>
  <!-- Can body -->
  <path d="M14 18 L14 40 Q14 43 17 43 L31 43 Q34 43 34 40 L34 18 Z" fill="#757575"/>
  <!-- Vertical grooves -->
  <line x1="20" y1="22" x2="20" y2="39" stroke="white" stroke-width="1.8"
        stroke-linecap="round" opacity="0.5"/>
  <line x1="24" y1="22" x2="24" y2="39" stroke="white" stroke-width="1.8"
        stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="22" x2="28" y2="39" stroke="white" stroke-width="1.8"
        stroke-linecap="round" opacity="0.5"/>
</svg>
